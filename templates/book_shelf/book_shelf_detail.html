<!DOCTYPE html>
<html>
<head>
    <title>Borrow Records</title>
    <!-- 引入 Bootstrap 5 CSS 文件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Book Shelf Detail</h1>
    <a href="{% url 'online_book_list' %}" class="btn btn-secondary">Back to Book_List</a>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">图书唯一标识</th>
            <th scope="col">图书名称</th>
            <th scope="col">图书作者</th>
            <th scope="col">出版社</th>
            <th scope="col">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td><img src="{{ bookshelf.book_image.url }}" width="100"></td>
            <td>{{ bookshelf.book_name }}</td>
            <td>{{ bookshelf.book_author }}</td>
            <td>{{ bookshelf.book_publisher }}</td>
            <td>
                <a href="{% url 'book_shelf_list' %}" class="btn btn-secondary">Back to List</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<!-- 引入 Bootstrap 5 JS 文件 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
