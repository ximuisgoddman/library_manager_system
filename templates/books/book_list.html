{% extends 'books/base.html' %}

{% block content %}
<h1>Book List</h1>
<a href="{% url 'book_create' %}" class="btn btn-primary my-3">Add Book</a>
<table class="table">
    <thead>
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    {% for book in books %}
    <tr>
        <td>{{ book.name }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.price }}</td>
        <td>
            <a href="{% url 'book_detail' book.book_id %}" class="btn btn-success btn-sm me-2">View</a>
            <a href="{% url 'book_update' book.book_id %}" class="btn btn-warning btn-sm me-2">Edit</a>
            <a href="{% url 'book_delete' book.book_id %}" class="btn btn-danger btn-sm">Delete</a>
            <a href="{% url 'book_borrow' book.book_id %}" class="btn btn-danger btn-sm">Borrow</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
