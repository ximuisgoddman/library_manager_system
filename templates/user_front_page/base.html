<!DOCTYPE html>
<html>
<head>
    <title>Library Management System</title>
    <!-- 加载 Bootstrap 样式 -->
    <link href="https://cdn.bootcss.com/twitter-bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <!-- 加载 jQuery 库 -->
    <script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.min.js"></script>

    <!-- 加载 Bootstrap JavaScript 库 -->
    <script src="https://cdn.bootcss.com/twitter-bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <style>
    body {
      background-image: url('/media/online_book_images/front_page.webp');
      background-size: cover;
    }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="#">图书馆</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'library_front_page' %}">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'login' %}">LogIn</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'user_online_book_list' %}">OnlineBooks</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'book_front_page' %}">OfflineBooks</a>
                </li>
            </ul>
        </div>
    </div>
    <!-- 模态框 -->
    <div class="modal fade" id="loginModal" tabindex="-1" role="dialog" aria-labelledby="loginModalLabel"
         aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loginModalLabel">已登录</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    已登录
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
    {% if user.is_authenticated %}
    <!-- 如果已登录，则显示一个模态框 -->
    <script>
  // 在页面加载后运行这个代码块
  window.onload = function() {
    // 选中登录按钮
    const loginButton = document.querySelector('a[href="{% url 'login' %}"]');
    // 给登录按钮添加一个点击事件监听器
    loginButton.addEventListener('click', function(event) {
      // 阻止默认行为（即打开登录页面）
      event.preventDefault();
      // 显示模态框
      $('#loginModal').modal('show');
    });
  };
    </script>
    {% endif %}

</nav>
<main class="container my-4">
    {% block content %}
    {% endblock %}
</main>
<!-- 加载 Bootstrap JavaScript -->
<link href="https://cdn.bootcss.com/twitter-bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
</body>
</html>
