<!DOCTYPE html>
<html>
<head>
    <title>Borrow Records</title>
    <!-- 引入 Bootstrap 5 CSS 文件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Borrow Records Detail</h1>
    <a href="{% url 'book_front_page' %}" class="btn btn-secondary">Back to Book_List</a>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">图书唯一标识</th>
            <th scope="col">借阅时间</th>
            <th scope="col">归还截至日期</th>
            <th scope="col">借阅者名字</th>
            <th scope="col">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>{{ record.book_id }}</td>
            <td>{{ record.record_user_borrow_time }}</td>
            <td>{{ record.record_user_borrow_deadline }}</td>
            <td>{{ record.record_user_id.name }}</td>
            <td>
                <a href="{% url 'borrow_record' record.record_user_id.id %}" class="btn btn-secondary">Back to List</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<!-- 引入 Bootstrap 5 JS 文件 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
