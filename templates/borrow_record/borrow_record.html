<!DOCTYPE html>
<html>
<head>
    <title>Borrow Records</title>
    <!-- 引入 Bootstrap 的 CSS 文件 -->
    <link rel="stylesheet" href="https://cdn.bootcss.com/bootstrap/4.1.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 class="my-4">Borrow Records List</h1>
    <a href="{% url 'book_front_page' %}" class="btn btn-secondary mb-4">Back to Book_List</a>
    <table class="table table-hover table-striped">
        <thead>
        <tr>
            <th scope="col">图书唯一标识</th>
            <th scope="col">借阅时间</th>
            <th scope="col">归还截至日期</th>
            <th scope="col">借阅者名字</th>
            <th scope="col">操作</th>
        </tr>
        </thead>
        <tbody>
        {% for record in borrow_records %}
        <tr>
            <td>{{ record.book_id }}</td>
            <td>{{ record.record_user_borrow_time }}</td>
            <td>{{ record.record_user_borrow_deadline }}</td>
            <td>{{ record.record_user_id.name }}</td>
            <td>
                <a href="{% url 'borrow_record_detail' record.id %}" class="btn btn-secondary btn-sm">View</a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
<!-- 引入 Bootstrap 的 JS 文件 -->
<script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.min.js"></script>
<script src="https://cdn.bootcss.com/popper.js/1.14.3/umd/popper.min.js"></script>
<script src="https://cdn.bootcss.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
</body>
</html>
