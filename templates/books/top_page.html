<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>图书浏览</title>
    <!-- 引入Bootstrap CSS文件 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">图书馆</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">图书浏览</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">借阅记录</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-3">
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <img src="https://via.placeholder.com/300x200.png?text=Book+Cover" class="card-img-top" alt="...">
                <div class="card-body">
                    <h5 class="card-title">图书名称</h5>
                    <p class="card-text">图书描述</p>
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">作者：xxx</li>
                    <li class="list-group-item">出版日期：xxxx-xx-xx</li>
                    <li class="list-group-item">ISBN：xxxxxxxxxx</li>
                </ul>
                <div class="card-body">
                    <button type="button" class="btn btn-primary">借阅</button>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="container mt-3">
    <h3>借阅记录</h3>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">借阅人</th>
            <th scope="col">图书名称</th>
            <th scope="col">借阅日期</th>
            <th scope="col">归还日期</th>
            <th scope="col">状态</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>张三</td>
            <td>图书1</td>
            <td>2023-04-16</td>
            <td>2023-04-23</td>
            <td>已归还</td>
        </tr>
        <tr>
            <td>李四</td>
            <td>图书2</td>
            <td>2023-04-17</td>
            <td>2023-04-24</td>
            <td>未归还</td>
        </tr>
        </tbody>
    </table>
</div>
<!-- 引入Bootstrap JS文件 -->
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/js/bootstrap.min.js"></script>
</body>
</html>
