{% extends 'admin_front_page/base.html' %}

{% block content %}
  <div class="container">
    <div class="row">
      <div class="col-md-6 offset-md-3">
        <div class="card">
          <div class="card-header">
            <h1 class="text-center">Book Detail</h1>
          </div>
          <div class="card-body">
            <h2>{{ book.name }}</h2>
            <p><strong>Author:</strong> {{ book.author }}</p>
            <p><strong>book_numbers:</strong> {{ book.book_numbers }}</p>
            <div class="text-center">
              <a href="{% url 'book_update' book.id %}" class="btn btn-primary">Edit</a>
              <a href="{% url 'book_delete' book.id %}" class="btn btn-danger">Delete</a>
              <a href="{% url 'book_list' %}" class="btn btn-secondary">Back to List</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
