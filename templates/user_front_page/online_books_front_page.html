{% extends 'user_front_page/base.html' %}

{% block content %}
<h1>Book List</h1>
<table class="table">
    <thead>
    <tr>
        <th scope="col">图书封面</th>
        <th scope="col">图书名称</th>
        <th scope="col">图书作者</th>
        <th scope="col">出版社</th>
        <th scope="col">操作</th>
    </tr>
    </thead>
    <tbody>
    {% for book in books %}
    <tr>
        <td><img src="{{ book.book_image.url }}" width="100"></td>
        <td>{{ book.book_name }}</td>
        <td>{{ book.book_author }}</td>
        <td>{{ book.book_publisher }}</td>
        <td>
            <a href="{% url 'add_book_shelf' book.id %}" class="btn btn-success btn-sm me-2">Add to BookShelf</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
